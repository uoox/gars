# model = "claude-opus-4-7[1m]"
# native_tools = true
# fake_cc_system_prompt = true
# thinking_type = "adaptive"
# max_tokens = 32768
# read_timeout_secs = 180
#
# 4. 智谱 GLM-5.1 Anthropic 兼容路径.
# [[llm.sessions]]
