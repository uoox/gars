name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - working-directory: extension
        run: |
          npm install --no-audit --no-fund
          npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: extension-zip
          path: extension/dist.zip
          if-no-files-found: error

  build-native:
    needs: extension
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            suffix: darwin-aarch64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: extension/
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --locked --target ${{ matrix.target }} --bin gars --bin garstool
      - run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/gars dist/gars-${{ matrix.suffix }}
          cp target/${{ matrix.target }}/release/garstool dist/garstool-${{ matrix.suffix }}
      - uses: actions/upload-artifact@v4
        with:
          name: bins-${{ matrix.suffix }}
          path: dist/*

  build-cross-linux:
    needs: extension
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            suffix: linux-aarch64
          - target: armv7-unknown-linux-gnueabihf
            suffix: linux-armv7
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: extension/
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cross
      - run: cross build --release --locked --target ${{ matrix.target }} --bin gars --bin garstool
      - run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/gars dist/gars-${{ matrix.suffix }}
          cp target/${{ matrix.target }}/release/garstool dist/garstool-${{ matrix.suffix }}
      - uses: actions/upload-artifact@v4
        with:
          name: bins-${{ matrix.suffix }}
          path: dist/*

  publish:
    needs: [build-native, build-cross-linux, extension]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: bins-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: extension-zip
          path: ext-assets
      - name: Stage extension zip
        run: cp ext-assets/dist.zip dist/gars-extension.zip
      - name: Checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
